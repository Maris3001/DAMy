spring.application.name=linhvecac

# Profile local mang giá trị kết nối thật (application-local.properties, gitignored)
spring.profiles.active=local

# ===== Datasource (giá trị thật đặt trong application-local.properties) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ===== JPA / Hibernate =====
# Schema do Flyway quản lý; Hibernate chỉ validate, không tự sinh DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.encoding=UTF-8
spring.flyway.locations=classpath:db/migration

# ===== JWT (giá trị thật đặt trong application-local.properties) =====
# Secret dạng Base64, tối thiểu 32 bytes (HS256)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}

# ===== Upload ảnh (poster phim, bắp nước) =====
# Thư mục lưu ảnh upload; phục vụ lại qua /api/files/**
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===== Server =====
# Đổi port khi 8080 bị chiếm: đặt biến môi trường SERVER_PORT
server.port=${SERVER_PORT:8080}
